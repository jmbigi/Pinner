<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="48" fill="#D53F8C"/>
  <g transform="translate(128,128)">
    <!-- Color palette circle -->
    <circle cx="0" cy="0" r="70" fill="#FFFFFF"/>
    <!-- Color swatches -->
