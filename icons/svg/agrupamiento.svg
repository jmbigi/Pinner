<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="48" fill="#38A169"/>
  <g transform="translate(128,128)">
    <!-- Individual small circles merging together -->
    <circle cx="-40" cy="-30" r="22" fill="#C6F6D5" opacity="0.7"/>
    <circle cx="40" cy="-30" r="22" fill="#C6F6D5" opacity="0.7"/>
    <circle cx="0" cy="30" r="22" fill="#C6F6D5" opacity="0.7"/>
    <!-- Merged central group -->
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" opacity="0.9"/>
    <!-- Arrows pointing inward -->
    <line x1="-70" y1="-30" x2="-40" y2="-30" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="70" y1="-30" x2="40" y2="-30" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="70" x2="0" y2="50" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 Z" fill="#FFFFFF"/>
      </marker>
    </defs>
  </g>
</svg>