<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="48" fill="#4299E1"/>
  <g transform="translate(128,128)">
    <!-- Vertical drill hole -->
    <line x1="0" y1="-75" x2="0" y2="75" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <!-- Deviation curve -->
    <path d="M0 -55 Q20 -25 40 5 Q60 35 70 80" fill="none" stroke="#FBD38D" stroke-width="8" stroke-linecap="round"/>
    <!-- Deviation arrow -->
    <polygon points="70,80 58,60 62,72 50,68" fill="#FBD38D"/>
    <!-- DLS indicator arc -->
    <path d="M-40 -55 Q-10 -45 0 -25" fill="none" stroke="#90CDF4" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-75" r="12" fill="#FFFFFF"/>
    <circle cx="0" cy="-75" r="6" fill="#4299E1"/>
  </g>
  <!-- Letra P -->
  <text x="128" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="100" font-weight="bold" fill="#FFFFFF" opacity="0.9">
    P
  </text>
</svg>
