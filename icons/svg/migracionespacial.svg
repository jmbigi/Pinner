<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="48" fill="#6B46C1"/>
  <g transform="translate(128,128)">
    <!-- 3D coordinate axes -->
    <line x1="-60" y1="50" x2="60" y2="-30" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="-60" y1="50" x2="0" y2="70" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="-60" y1="50" x2="-80" y2="-30" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <!-- Axis labels X, Y, Z -->
    <text x="65" y="-35" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">X</text>
    <text x="5" y="85" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">Y</text>
    <text x="-95" y="-35" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">Z</text>
    <!-- Point A and Point B -->
    <circle cx="-20" cy="20" r="10" fill="#FBD38D"/>
    <circle cx="30" cy="-10" r="10" fill="#FBD38D"/>
    <!-- Connection line between points -->
    <line x1="-20" y1="20" x2="30" y2="-10" stroke="#FBD38D" stroke-width="4" stroke-dasharray="6,4"/>
    <!-- Sparkle/match indicator -->
    <circle cx="-20" cy="20" r="4" fill="#FFFFFF"/>
    <circle cx="30" cy="-10" r="4" fill="#FFFFFF"/>
    <text x="-25" y="40" fill="#FFFFFF" font-family="sans-serif" font-size="14">A</text>
    <text x="35" y="-15" fill="#FFFFFF" font-family="sans-serif" font-size="14">B</text>
  </g>
</svg>