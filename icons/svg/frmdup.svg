<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="48" fill="#DD6B20"/>
  <g transform="translate(128,100)">
    <!-- Duplicate documents -->
    <rect x="-50" y="-50" width="70" height="80" rx="6" fill="#FFF5F5" transform="rotate(-10)"/>
    <rect x="-20" y="-30" width="70" height="80" rx="6" fill="#FFFFFF" transform="rotate(10)"/>
    <!-- Chart line on front document -->
    <polyline points="0,10 15,-5 30,20 45,0" fill="none" stroke="#DD6B20" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Duplicate indicator (two circles) -->
    <circle cx="-10" cy="45" r="6" fill="#DD6B20"/>
    <circle cx="15" cy="45" r="6" fill="#DD6B20"/>
    <line x1="-4" y1="45" x2="9" y2="45" stroke="#DD6B20" stroke-width="2"/>
  </g>
</svg>